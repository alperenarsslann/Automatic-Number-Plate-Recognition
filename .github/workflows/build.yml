name: build

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  studio:
    name: ANPR Studio (.NET)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Build AnprStudio
        run: dotnet build proj/AnprStudio -c Release --nologo

  pipeline:
    name: ANPR pipeline (C++ / vcpkg)
    runs-on: windows-latest
    env:
      # vcpkg binary cache -> GitHub Actions cache. The first run builds
      # OpenCV (with ffmpeg + opencl) from source and is slow (~1h); after
      # that the archives are restored from cache and the build is quick.
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\vcpkg_bincache
    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg binaries
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-${{ runner.os }}-${{ hashFiles('cmake/anpr/vcpkg.json') }}

      # The presets use the Ninja + cl.exe toolchain, which needs the MSVC
      # developer environment on PATH.
      - name: Set up MSVC (cl.exe)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure & build (Release)
        working-directory: cmake/anpr
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force $env:VCPKG_DEFAULT_BINARY_CACHE | Out-Null
          cmake --preset x64-release
          cmake --build out/build/x64-release

      - name: Smoke test (--help)
        working-directory: cmake/anpr
        shell: pwsh
        run: out/build/x64-release/control/anpr.exe --help
